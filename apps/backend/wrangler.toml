name = "pw-asist-backend"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "pw-asist"
database_id = "5f8cd3bd-7116-4691-b900-716aa963b877"
migrations_dir = "migrations"

[vars]
CORS_ORIGIN = "https://pw-asist-frontend.pages.dev,https://pw-assistant.com,https://www.pw-assistant.com"
RESEND_FROM_EMAIL = "noreply@pw-assistant.com"

# Secrets must be set via CLI (not stored here):
#   wrangler secret put JWT_SECRET
#   wrangler secret put RESEND_API_KEY
